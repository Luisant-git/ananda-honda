<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ANANDA MOTOWINGS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      :root, .theme-bigwings {
        /* BIGWINGS Theme - Professional Sleek Blue/Indigo */
        --brand-bg: #f8fafc;
        --brand-surface: #ffffff;
        --brand-border: #e2e8f0;
        --brand-hover: #f1f5f9;
        --brand-accent: #1e40af; /* Indigo 800 */
        --brand-accent-hover: #1e3a8a; /* Indigo 900 */
        --brand-text-primary: #0f172a;
        --brand-text-secondary: #475569;
        --brand-sidebar: #0f172a;
      }
      
      .theme-redwings {
        /* REDWINGS Theme - Premium Crimson Red (Standard Text) */
        --brand-bg: #fff1f2;
        --brand-surface: #ffffff;
        --brand-border: #fecdd3;
        --brand-hover: #ffe4e6;
        --brand-accent: #be123c; /* Rose 700 */
        --brand-accent-hover: #9f1239; /* Rose 800 */
        --brand-text-primary: #0f172a; /* Kept standard dark slate */
        --brand-text-secondary: #475569; /* Kept standard gray */
        --brand-sidebar: #0f172a;
      }
    </style>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              'brand-bg': 'var(--brand-bg)',
              'brand-surface': 'var(--brand-surface)',
              'brand-border': 'var(--brand-border)',
              'brand-hover': 'var(--brand-hover)',
              'brand-accent': 'var(--brand-accent)',
              'brand-accent-hover': 'var(--brand-accent-hover)',
              'brand-text-primary': 'var(--brand-text-primary)',
              'brand-text-secondary': 'var(--brand-text-secondary)',
              'brand-sidebar': 'var(--brand-sidebar)',
            }
          }
        }
      }
    </script>
    <script src="https://cdn.sheetjs.com/xlsx-0.18.5/package/dist/xlsx.full.min.js"></script>
